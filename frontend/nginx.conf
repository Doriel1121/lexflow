# nginx config for the LexFlow frontend container
# Placed at /etc/nginx/conf.d/lexflow.conf inside the container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Health check endpoint (used by Docker HEALTHCHECK) ────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Hashed static assets — cache 1 year ──────────────────
    # Vite fingerprints assets (main.a3f92b.js) so long TTL is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → FastAPI backend ───────────────────────────
    # Removes /api prefix before forwarding:
    #   /api/v1/cases  →  http://backend:8000/v1/cases
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (for /api/v1/ws/notifications)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # ── WebSocket direct path (notifications) ─────────────────
    location /v1/ws/ {
        proxy_pass         http://backend:8000/v1/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 300s;
    }

    # ── React SPA — all other routes serve index.html ─────────
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must not be cached (it references hashed assets)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
